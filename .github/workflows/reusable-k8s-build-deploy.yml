name: Reusable K8s Build and Deploy

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      namespace:
        required: true
        type: string
      image_pull_secret_name:
        required: true
        type: string
      secret_name:
        required: false
        type: string
        default: ""
      context:
        required: false
        type: string
        default: .
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      build_args:
        required: false
        type: string
        default: ""
      replicas:
        required: false
        type: string
        default: "1"
      container_port:
        required: false
        type: string
        default: "3000"
      enable_probes:
        required: false
        type: string
        default: "true"
      health_path:
        required: false
        type: string
        default: /health
      ingress_hosts:
        required: false
        type: string
        default: ""
      tls_secret_name:
        required: false
        type: string
        default: ""
      ingress_annotations:
        required: false
        type: string
        default: ""
      environment_name:
        required: false
        type: string
        default: production
      deploy_worker:
        required: false
        type: boolean
        default: false
      deploy_mcp:
        required: false
        type: boolean
        default: false
    secrets:
      KUBE_CONFIG:
        required: true
      KUBE_CONTEXT:
        required: false
      AUTUS_ATOMUS_GH_TOKEN:
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/autus-solutions/${{ inputs.app_name }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/autus-solutions/${{ inputs.app_name }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Checkout Autus Infra for deploy scripts
        uses: actions/checkout@v4
        with:
          repository: Autus-Solutions/autus-infra
          path: autus-infra

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config || \
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          if [ -n "${{ secrets.KUBE_CONTEXT }}" ]; then
            kubectl config use-context "${{ secrets.KUBE_CONTEXT }}"
          fi

      - name: Validate Kubernetes connection
        run: kubectl cluster-info

      - name: Prepare Kubernetes Manifests
        env:
          INGRESS_HOSTS: ${{ inputs.ingress_hosts }}
          INGRESS_ANNOTATIONS: ${{ inputs.ingress_annotations }}
          TLS_SECRET_NAME: ${{ inputs.tls_secret_name }}
        run: |
          export IMAGE_TAG="sha-${GITHUB_SHA}"
          export FULL_IMAGE="${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          export K8S_SECRET_NAME="${{ inputs.secret_name }}"
          if [ -z "$K8S_SECRET_NAME" ]; then
            K8S_SECRET_NAME="${{ inputs.app_name }}-secrets"
          fi
          export PROBES_BLOCK=""
          if [ "${{ inputs.enable_probes }}" != "false" ]; then
            PROBES_BLOCK="$(printf '%s\n' \
              '          readinessProbe:' \
              '            httpGet:' \
              '              path: ${{ inputs.health_path }}' \
              '              port: ${{ inputs.container_port }}' \
              '            initialDelaySeconds: 10' \
              '            periodSeconds: 10' \
              '          livenessProbe:' \
              '            httpGet:' \
              '              path: ${{ inputs.health_path }}' \
              '              port: ${{ inputs.container_port }}' \
              '            initialDelaySeconds: 30' \
              '            periodSeconds: 20')"
          fi
          
          for file in autus-infra/kubernetes/templates/*.yaml; do
            APP_NAME="${{ inputs.app_name }}" NAMESPACE="${{ inputs.namespace }}" \
            IMAGE="$FULL_IMAGE" IMAGE_PULL_SECRET="${{ inputs.image_pull_secret_name }}" \
            SECRET_NAME="$K8S_SECRET_NAME" REPLICAS="${{ inputs.replicas }}" \
            CONTAINER_PORT="${{ inputs.container_port }}" HEALTH_PATH="${{ inputs.health_path }}" \
            PROBES_BLOCK="$PROBES_BLOCK" \
            envsubst '$APP_NAME $NAMESPACE $IMAGE $IMAGE_PULL_SECRET $SECRET_NAME $REPLICAS $CONTAINER_PORT $HEALTH_PATH $PROBES_BLOCK' < "$file" > "deploy_$(basename $file)"
          done

          if [ -n "$INGRESS_HOSTS" ]; then
            {
              echo "apiVersion: networking.k8s.io/v1"
              echo "kind: Ingress"
              echo "metadata:"
              echo "  name: ${{ inputs.app_name }}-ingress"
              echo "  namespace: ${{ inputs.namespace }}"
              echo "  annotations:"
              echo "    kubernetes.io/ingress.class: \"public\""
              while IFS= read -r annotation; do
                [ -z "$annotation" ] && continue
                echo "    $annotation"
              done <<< "$INGRESS_ANNOTATIONS"
              echo "spec:"
              if [ -n "$TLS_SECRET_NAME" ]; then
                echo "  tls:"
                echo "    - hosts:"
                IFS=',' read -ra hosts <<< "$INGRESS_HOSTS"
                for host in "${hosts[@]}"; do
                  host="$(echo "$host" | xargs)"
                  [ -z "$host" ] && continue
                  echo "        - $host"
                done
                echo "      secretName: $TLS_SECRET_NAME"
              fi
              echo "  rules:"
              IFS=',' read -ra hosts <<< "$INGRESS_HOSTS"
              for host in "${hosts[@]}"; do
                host="$(echo "$host" | xargs)"
                [ -z "$host" ] && continue
                echo "    - host: $host"
                echo "      http:"
                echo "        paths:"
                echo "          - path: /"
                echo "            pathType: Prefix"
                echo "            backend:"
                echo "              service:"
                echo "                name: ${{ inputs.app_name }}"
                echo "                port:"
                echo "                  number: 80"
              done
            } > deploy_ingress.yaml
          fi

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f deploy_deployment.yaml -n ${{ inputs.namespace }}
          
          if [ -f deploy_service.yaml ]; then
            kubectl apply -f deploy_service.yaml -n ${{ inputs.namespace }}
          fi

          if [ -f deploy_ingress.yaml ]; then
            kubectl apply -f deploy_ingress.yaml -n ${{ inputs.namespace }}
          fi
          
          if [ -f autus-infra/kubernetes/overlays/${{ inputs.namespace }}/ingress-${{ inputs.app_name }}.yaml ]; then
             kubectl apply -f autus-infra/kubernetes/overlays/${{ inputs.namespace }}/ingress-${{ inputs.app_name }}.yaml -n ${{ inputs.namespace }}
          fi

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ inputs.app_name }} -n ${{ inputs.namespace }} --timeout=120s
