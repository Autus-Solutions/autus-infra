name: Reusable K8s Build and Deploy

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      namespace:
        required: true
        type: string
      image_pull_secret_name:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      deploy_worker:
        required: false
        type: boolean
        default: false
      deploy_mcp:
        required: false
        type: boolean
        default: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Checkout Autus Infra for deploy scripts
        uses: actions/checkout@v4
        with:
          repository: Autus-Solutions/autus-infra
          path: autus-infra
          token: ${{ secrets.AUTUS_ATOMUS_GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config || \
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          if [ -n "${{ secrets.KUBE_CONTEXT }}" ]; then
            kubectl config use-context "${{ secrets.KUBE_CONTEXT }}"
          fi

      - name: Validate Kubernetes connection
        run: kubectl cluster-info

      - name: Prepare Kubernetes Manifests
        run: |
          export IMAGE_TAG="sha-${GITHUB_SHA}"
          export FULL_IMAGE="${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          
          for file in autus-infra/kubernetes/templates/*.yaml; do
            APP_NAME="${{ inputs.app_name }}" NAMESPACE="${{ inputs.namespace }}" \
            IMAGE="$FULL_IMAGE" IMAGE_PULL_SECRET="${{ inputs.image_pull_secret_name }}" \
            envsubst '$APP_NAME $NAMESPACE $IMAGE $IMAGE_PULL_SECRET' < "$file" > "deploy_$(basename $file)"
          done

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f deploy_deployment.yaml -n ${{ inputs.namespace }}
          
          if [ -f deploy_service.yaml ]; then
            kubectl apply -f deploy_service.yaml -n ${{ inputs.namespace }}
          fi
          
          if [ -f autus-infra/kubernetes/overlays/${{ inputs.namespace }}/ingress-${{ inputs.app_name }}.yaml ]; then
             kubectl apply -f autus-infra/kubernetes/overlays/${{ inputs.namespace }}/ingress-${{ inputs.app_name }}.yaml -n ${{ inputs.namespace }}
          fi

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ inputs.app_name }} -n ${{ inputs.namespace }} --timeout=120s
