name: Reusable GHCR Pull Secret Sync

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      secret_name:
        required: false
        type: string
        default: ghcr-pull-secret
    secrets:
      KUBE_CONFIG:
        required: true
      AUTUS_GHCR_PULL_USERNAME:
        required: true
      AUTUS_GHCR_PULL_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace to receive the pull secret.
        required: true
        type: string
      secret_name:
        description: Kubernetes secret name.
        required: false
        type: string
        default: ghcr-pull-secret

permissions:
  contents: read

jobs:
  sync:
    name: Sync GHCR Pull Secret
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Autus infra
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONTEXT: ${{ vars.KUBE_CONTEXT }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG repository secret is empty or unavailable." >&2
            exit 1
          fi

          if printf '%s' "$KUBE_CONFIG" | grep -q '\\n'; then
            printf '%b' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG" | grep -q 'apiVersion:'; then
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config.decoded" 2>/dev/null \
            && grep -q 'apiVersion:' "$HOME/.kube/config.decoded"; then
            mv "$HOME/.kube/config.decoded" "$HOME/.kube/config"
          else
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          fi
          rm -f "$HOME/.kube/config.decoded"
          chmod 600 "$HOME/.kube/config"
          kubectl config view --minify >/dev/null
          if [ -n "$KUBE_CONTEXT" ]; then
            kubectl config use-context "$KUBE_CONTEXT"
          fi

      - name: Create or update pull secret
        env:
          AUTUS_GHCR_PULL_USERNAME: ${{ secrets.AUTUS_GHCR_PULL_USERNAME }}
          AUTUS_GHCR_PULL_TOKEN: ${{ secrets.AUTUS_GHCR_PULL_TOKEN }}
        run: ./scripts/create-ghcr-pull-secret.sh "${{ inputs.namespace }}" "${{ inputs.secret_name }}"
