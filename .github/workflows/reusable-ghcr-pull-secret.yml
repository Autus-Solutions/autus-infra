name: Reusable GHCR Pull Secret Sync

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      secret_name:
        required: false
        type: string
        default: ghcr-pull-secret
      environment_name:
        required: false
        type: string
        default: production
    secrets:
      KUBE_CONFIG:
        required: true
      AUTUS_GHCR_PULL_USERNAME:
        required: true
      AUTUS_GHCR_PULL_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace to receive the pull secret.
        required: true
        type: string
      secret_name:
        description: Kubernetes secret name.
        required: false
        type: string
        default: ghcr-pull-secret
      environment_name:
        description: GitHub Environment that contains KUBE_CONFIG.
        required: false
        type: string
        default: production

permissions:
  contents: read

jobs:
  sync:
    name: Sync GHCR Pull Secret
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    steps:
      - name: Checkout Autus infra
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          if [ -n "${{ vars.KUBE_CONTEXT }}" ]; then
            kubectl config use-context "${{ vars.KUBE_CONTEXT }}"
          fi

      - name: Create or update pull secret
        env:
          AUTUS_GHCR_PULL_USERNAME: ${{ secrets.AUTUS_GHCR_PULL_USERNAME }}
          AUTUS_GHCR_PULL_TOKEN: ${{ secrets.AUTUS_GHCR_PULL_TOKEN }}
        run: ./scripts/create-ghcr-pull-secret.sh "${{ inputs.namespace }}" "${{ inputs.secret_name }}"
