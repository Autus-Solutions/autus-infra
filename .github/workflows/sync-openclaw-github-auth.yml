name: Sync OpenClaw GitHub Auth

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace that runs OpenClaw.
        required: false
        type: string
        default: openclaw
      deployment:
        description: Kubernetes deployment that runs OpenClaw.
        required: false
        type: string
        default: openclaw
      secret_name:
        description: Kubernetes secret name for GitHub CLI auth.
        required: false
        type: string
        default: github-cli-auth

permissions:
  contents: read

jobs:
  sync:
    name: Sync OpenClaw GitHub Auth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Autus infra
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONTEXT: ${{ vars.KUBE_CONTEXT }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG repository secret is empty or unavailable." >&2
            exit 1
          fi

          if printf '%s' "$KUBE_CONFIG" | grep -q '\\n'; then
            printf '%b' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG" | grep -q 'apiVersion:'; then
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config.decoded" 2>/dev/null \
            && grep -q 'apiVersion:' "$HOME/.kube/config.decoded"; then
            mv "$HOME/.kube/config.decoded" "$HOME/.kube/config"
          else
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          fi
          rm -f "$HOME/.kube/config.decoded"
          chmod 600 "$HOME/.kube/config"
          kubectl config view --minify >/dev/null
          if [ -n "$KUBE_CONTEXT" ]; then
            kubectl config use-context "$KUBE_CONTEXT"
          fi

      - name: Sync GitHub CLI auth into OpenClaw
        env:
          GH_TOKEN: ${{ secrets.AUTUS_ATOMUS_GH_TOKEN }}
          NAMESPACE: ${{ inputs.namespace }}
          DEPLOYMENT: ${{ inputs.deployment }}
          SECRET_NAME: ${{ inputs.secret_name }}
        run: ./scripts/bootstrap-openclaw-gh-auth.sh
