name: Reusable Kubernetes Secret Sync

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      secret_name:
        required: true
        type: string
      keys:
        required: true
        type: string
    secrets:
      KUBE_CONFIG:
        required: true
      KUBE_CONTEXT:
        required: false
      ASPNETCORE_ENVIRONMENT:
        required: false
      ConnectionStrings__Database:
        required: false
      ConnectionStrings__Timeseries:
        required: false
      ConnectionStrings__Amqp:
        required: false
      MessageBroker__Host:
        required: false
      MessageBroker__VHost:
        required: false
      MessageBroker__Port:
        required: false
      MessageBroker__Username:
        required: false
      MessageBroker__Password:
        required: false
      MqttBroker__Host:
        required: false
      MqttBroker__Port:
        required: false
      MqttBroker__Username:
        required: false
      MqttBroker__Password:
        required: false
      SENDGRID_API_KEY:
        required: false
      CFTURNSTILE_SECRET_KEY:
        required: false

permissions:
  contents: read

jobs:
  sync:
    name: Sync Kubernetes Secret
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONTEXT: ${{ secrets.KUBE_CONTEXT || vars.KUBE_CONTEXT }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG repository secret is empty or unavailable." >&2
            exit 1
          fi

          if printf '%s' "$KUBE_CONFIG" | grep -q '\\n'; then
            printf '%b' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG" | grep -q 'apiVersion:'; then
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config.decoded" 2>/dev/null \
            && grep -q 'apiVersion:' "$HOME/.kube/config.decoded"; then
            mv "$HOME/.kube/config.decoded" "$HOME/.kube/config"
          else
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          fi
          rm -f "$HOME/.kube/config.decoded"
          chmod 600 "$HOME/.kube/config"
          kubectl config view --minify >/dev/null
          if [ -n "$KUBE_CONTEXT" ]; then
            kubectl config use-context "$KUBE_CONTEXT"
          fi

      - name: Create or update secret
        shell: bash
        env:
          NAMESPACE: ${{ inputs.namespace }}
          SECRET_NAME: ${{ inputs.secret_name }}
          SECRET_KEYS: ${{ inputs.keys }}
          ASPNETCORE_ENVIRONMENT: ${{ secrets.ASPNETCORE_ENVIRONMENT }}
          ConnectionStrings__Database: ${{ secrets.ConnectionStrings__Database }}
          ConnectionStrings__Timeseries: ${{ secrets.ConnectionStrings__Timeseries }}
          ConnectionStrings__Amqp: ${{ secrets.ConnectionStrings__Amqp }}
          MessageBroker__Host: ${{ secrets.MessageBroker__Host }}
          MessageBroker__VHost: ${{ secrets.MessageBroker__VHost }}
          MessageBroker__Port: ${{ secrets.MessageBroker__Port }}
          MessageBroker__Username: ${{ secrets.MessageBroker__Username }}
          MessageBroker__Password: ${{ secrets.MessageBroker__Password }}
          MqttBroker__Host: ${{ secrets.MqttBroker__Host }}
          MqttBroker__Port: ${{ secrets.MqttBroker__Port }}
          MqttBroker__Username: ${{ secrets.MqttBroker__Username }}
          MqttBroker__Password: ${{ secrets.MqttBroker__Password }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          CFTURNSTILE_SECRET_KEY: ${{ secrets.CFTURNSTILE_SECRET_KEY }}
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r key; do
            key="$(printf '%s' "$key" | xargs)"
            if [ -z "$key" ]; then
              continue
            fi
            value="${!key:-}"
            if [ -z "$value" ]; then
              echo "Required secret is empty or unavailable: $key" >&2
              exit 1
            fi
            args+=(--from-literal="$key=$value")
          done <<< "$SECRET_KEYS"

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic "$SECRET_NAME" \
            -n "$NAMESPACE" \
            "${args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Kubernetes Secret $NAMESPACE/$SECRET_NAME is synced."
